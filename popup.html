<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    padding: 16px;
    background: #fafafa;
  }
  h1 {
    font-size: 16px;
    margin-bottom: 12px;
    font-weight: 600;
  }
  fieldset {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  legend {
    font-weight: 600;
    padding: 0 4px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .toggle-row input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  label[for="enabled"] {
    cursor: pointer;
    user-select: none;
  }
  .profile-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .profile-row select {
    flex: 1;
    padding: 5px 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
  }
  .profile-row select:focus {
    outline: 2px solid #6b5ce7;
    border-color: transparent;
  }
  .btn {
    padding: 5px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: #f0f0f0; }
  .btn-danger { color: #c0392b; }
  .btn-danger:hover { background: #fdecea; }
  .btn-danger:disabled {
    color: #ccc;
    cursor: default;
    background: #fff;
  }
  .name-row {
    margin-bottom: 10px;
  }
  .name-row input {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
  }
  .name-row input:focus {
    outline: 2px solid #6b5ce7;
    border-color: transparent;
  }
  label[for="profileName"],
  label[for="primerText"] {
    display: block;
    font-weight: 500;
    margin-bottom: 4px;
  }
  textarea {
    width: 100%;
    min-height: 120px;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.4;
    resize: vertical;
  }
  textarea:focus {
    outline: 2px solid #6b5ce7;
    border-color: transparent;
  }
  #status {
    font-size: 12px;
    color: #666;
    min-height: 18px;
    margin-top: 8px;
  }
  .version {
    text-align: right;
    font-size: 11px;
    color: #999;
    margin-top: 8px;
  }
  .donate {
    font-size: 12px;
    color: #555;
    line-height: 1.5;
    margin-top: 12px;
    padding: 10px;
    background: #f0eef9;
    border-radius: 8px;
  }
  .donate a {
    color: #6b5ce7;
    font-weight: 600;
    text-decoration: none;
  }
  .donate a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
  <h1>Claude Auto-Primer</h1>

  <fieldset>
    <legend>Settings</legend>

    <div class="toggle-row">
      <input type="checkbox" id="enabled">
      <label for="enabled">Enable auto-primer</label>
    </div>

    <div class="profile-row">
      <select id="profileSelect" aria-label="Select profile"></select>
      <button class="btn" id="newProfile">+ New</button>
      <button class="btn btn-danger" id="deleteProfile" title="Delete profile">Del</button>
    </div>

    <div class="name-row">
      <label for="profileName">Profile name</label>
      <input type="text" id="profileName" placeholder="Profile name...">
    </div>

    <div class="toggle-row">
      <input type="checkbox" id="autoRename">
      <label for="autoRename">Auto-rename chat to date/time</label>
    </div>

    <label for="primerText">Primer message</label>
    <textarea id="primerText" placeholder="Enter the message to send at the start of each new chat..."></textarea>

    <div id="status" role="status" aria-live="polite"></div>
  </fieldset>

  <div class="donate">
    Enjoying this extension? Please consider supporting the
    <strong>Middlesex Association for the Blind</strong>
    (charity no. 207007) — helping people with sight loss since 1922.
    <a href="https://aftb.org.uk/donate/" target="_blank" rel="noopener">Make a donation</a>
  </div>

  <div class="version">v1.3.0</div>

  <script src="popup.js"></script>
</body>
</html>
